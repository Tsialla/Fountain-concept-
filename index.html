<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaArt | Premium Architectural Water Features</title>
    <!-- Tailwind CSS-ի միացում արագ դիզայնի համար -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- 1. HERO SECTION (Գլխավոր բլոկ՝ Frame Fountain նկարով) -->
    <div class="relative h-screen w-full bg-cover bg-center" style="background-image: url('hero-bg.png');">
        <!-- Մուգ շերտ նկարի վրա, որպեսզի տեքստը հստակ կարդացվի -->
        <div class="absolute inset-0 bg-black/40"></div>

        <!-- Մենյու (Header) -->
        <header class="absolute inset-x-0 top-0 z-50 flex items-center justify-between px-8 py-6 md:px-16">
            <div class="text-white text-2xl font-bold tracking-wider">AQUA<span class="text-amber-600">ART</span></div>
            <nav class="hidden md:flex space-x-8 text-white/90 font-medium">
                <a href="#" class="hover:text-amber-500 transition">Collections</a>
                <a href="#" class="hover:text-amber-500 transition">Materials</a>
                <a href="#" class="hover:text-amber-500 transition">Our Story</a>
                <a href="#" class="hover:text-amber-500 transition">Contact</a>
            </nav>
            <button class="border border-white text-white px-5 py-2 rounded-sm hover:bg-white hover:text-black transition font-medium">
                Inquire Now
            </button>
        </header>

        <!-- Գլխավոր Տեքստը Էկրանի Մեջտեղում -->
        <div class="relative z-10 flex h-full items-center justify-center text-center px-4">
            <div class="max-w-3xl">
                <h1 class="text-4xl md:text-6xl font-light tracking-wide text-white mb-6">
                    Bring the Elements to Life
                </h1>
                <p class="text-lg md:text-xl text-white/80 font-light mb-8 max-w-2xl mx-auto leading-relaxed">
                    Architectural water features crafted from Corten and Stainless Steel. Designed to transform your garden into a modern sanctuary.
                </p>
                <a href="#collections" class="bg-amber-600 text-white px-8 py-3.5 rounded-sm hover:bg-amber-700 transition font-medium uppercase tracking-wider text-sm">
                    Explore the Collection
                </a>
            </div>
        </div>
    </div>

    <!-- Ասա երբ պատրաստ լինես, որ հաջորդ՝ ապրանքների բաժինն էլ ավելացնենք այստեղ -->

</body>
</html>
